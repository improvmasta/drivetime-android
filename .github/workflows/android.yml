name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # contents: write — the release step below publishes the sideload APK as a GitHub release.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      # No wrapper jar is committed; generate it, then build. Gradle 8.11.1 is AGP 8.10's
      # floor — keep this in step with the AGP version in build.gradle.kts.
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.11.1

      # Flavours (github | play) rename every task: testDebugUnitTest is now
      # testGithubDebugUnitTest, etc. The two flavours share all source, so testing one
      # covers both — except the updater gate, which is a compile-time constant.
      - name: Unit tests
        run: ./gradlew testGithubDebugUnitTest --stacktrace

      - name: Android Lint
        run: ./gradlew lintGithubDebug --stacktrace

      # --- sideload channel: the signed debug APK, as before ---
      - name: Build sideload APK
        run: ./gradlew assembleGithubDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: drivetime-debug-apk
          path: app/build/outputs/apk/github/debug/*.apk
          if-no-files-found: error

      # --- Play channel: a release AAB, which is the only format Play accepts ---
      # Signed with the same committed key, which here acts as the UPLOAD key. Whether the
      # APK Play then serves is signed with this key too depends on the app-signing choice
      # made in Play Console — and that decision is load-bearing (CLAUDE.md → Distribution).
      - name: Build Play bundle
        run: ./gradlew bundlePlayRelease --stacktrace

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: drivetime-play-aab
          path: app/build/outputs/bundle/playRelease/*.aab
          if-no-files-found: error

      # Publishes the sideload APK as a GitHub release. This used to be an *update* channel —
      # the in-app updater polled releases/latest/download/version.json — but the updater is
      # deleted (Play forbids self-updating), so nothing reads version.json any more and no
      # install updates itself from here. What's left is a plain build artifact: an APK you
      # can install by hand. Every real install updates through Play (the step below).
      # It still emits version.json because drivetime/publish-apk.sh and ship.sh's publish
      # gate expect the pair; retiring that whole path is a separate cleanup.
      - name: Publish GitHub release (sideload APK artifact)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/github/debug/*.apk drivetime.apk
          notes="$(git log -1 --pretty=%s)"
          jq -n --argjson versionCode "${{ github.run_number }}" \
                --arg versionName "0.1.${{ github.run_number }}" \
                --arg apk "drivetime.apk" --arg notes "$notes" \
                --arg publishedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                '{versionCode:$versionCode, versionName:$versionName, apk:$apk, notes:$notes, publishedAt:$publishedAt}' \
                > version.json
          gh release create "v0.1.${{ github.run_number }}" drivetime.apk version.json \
            --title "0.1.${{ github.run_number }}" --notes "$notes"

      # --- Play channel: push the AAB straight to the internal testing track ---
      # Gated on push-to-main exactly like the release above, and NEVER on pull_request: this
      # repo is public, and a fork's PR must not get within reach of the publisher credential.
      # Skipped (not failed) when the secret is absent, so a fork — or this repo before the
      # secret was set — still builds green.
      #
      # Play rejects a versionCode it has already seen, so the monotonic CI run number that
      # feeds versionCode (app/build.gradle.kts) is load-bearing here, not a convenience.
      # The `secrets` context is NOT available in a step-level `if`, so the presence of the
      # credential is resolved here into a plain output the next step can branch on. It also
      # writes the release note Play shows testers (the commit subject, capped at Play's 500).
      - name: Stage Play release
        id: play
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p distribution/whatsnew
          git log -1 --pretty=%s | cut -c1-500 > distribution/whatsnew/whatsnew-en-US
          if [ -n "$PLAY_SA" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PLAY_SERVICE_ACCOUNT_JSON is not set — skipping the Play upload."
          fi

      - name: Upload to Play (internal testing)
        if: steps.play.outputs.ready == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.jupiterns.drivetime
          releaseFiles: app/build/outputs/bundle/playRelease/*.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-githubDebug.html
          if-no-files-found: ignore

      - name: Upload unit-test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testGithubDebugUnitTest
          if-no-files-found: ignore
